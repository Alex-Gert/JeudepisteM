<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monaco Quest - Officiel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --monaco-red: #e31d23; --dark: #222; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        #map { height: 100vh; width: 100%; background: #ddd; z-index: 1; }

        /* Manette Tactile flottante */
        .ui-overlay {
            position: absolute; bottom: 30px; left: 20px; z-index: 10;
            background: rgba(255, 255, 255, 0.85); padding: 12px; border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(2, 50px); gap: 8px; }
        .d-btn { 
            width: 50px; height: 50px; background: var(--dark); color: white; border: none; 
            border-radius: 12px; font-size: 20px; display: flex; align-items: center; justify-content: center; 
            touch-action: manipulation;
        }
        .d-btn:active { background: var(--monaco-red); transform: scale(0.95); }
        .up { grid-column: 2; } .left { grid-column: 1; grid-row: 2; } .down { grid-column: 2; grid-row: 2; } .right { grid-column: 3; grid-row: 2; }

/* Fenêtre Plein Écran (Modal) ultra-transparente */
        #photo-modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            /* 0.6 = 60% de blanc, donc 40% de transparence */
            background: rgba(255, 255, 255, 0.6); 
            /* Flou plus léger pour mieux voir la carte */
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px);
            z-index: 100; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            text-align: center; 
            padding: 30px; 
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out;
        }
        /* Croix de fermeture */
        .close-modal {
            position: absolute; top: 25px; right: 25px; font-size: 50px;
            color: var(--dark); cursor: pointer; font-weight: bold; line-height: 0.5;
            z-index: 101;
        }

        /* Titre plus gros et remonté */
        #modal-title { 
            color: var(--monaco-red); 
            font-size: 2.2rem; 
            margin-top: -60px; 
            margin-bottom: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Texte du défi */
        #modal-text { 
            font-size: 1.25rem; 
            line-height: 1.6; 
            margin-bottom: 40px; 
            color: #222; 
            font-weight: 500;
            max-width: 450px;
        }

        .btn-capture {
            background: var(--monaco-red); color: white; padding: 20px 40px;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(227, 29, 35, 0.3); cursor: pointer;
            width: 100%; max-width: 280px;
        }

        /* Écran de chargement */
        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 200; flex-direction: column;
            align-items: center; justify-content: center; font-weight: bold; color: var(--monaco-red);
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--monaco-red);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay">
        <div class="d-pad">
            <button class="d-btn up" onclick="move('up')">▲</button>
            <button class="d-btn left" onclick="move('left')">◀</button>
            <button class="d-btn down" onclick="move('down')">▼</button>
            <button class="d-btn right" onclick="move('right')">▶</button>
        </div>
    </div>

    <div id="photo-modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <h2 id="modal-title">Défi trouvé !</h2>
            <p id="modal-text">Texte du défi ici...</p>
            
            <input type="file" accept="image/*" capture="camera" id="camera-input" style="display:none;">
            <button class="btn-capture" onclick="document.getElementById('camera-input').click()">📸 PRENDRE LA PHOTO</button>
        </div>
    </div>

    <div id="loader-overlay">
        <div class="spinner"></div>
        ENVOI VERS LE DRIVE...
    </div>

    <script>
        // URL de ton script Google Apps Script
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoZMixrepJ5sJKEg9gFguaZzY20pCnmgCkR5fwgQhkl-MoNACYcXNM2j9YcQyZlu55Tw/exec";

        let map, playerMarker, playerPos;
        let activeDefi = null;

        const defis = [
            { 
                id: 1, lat: 43.7311, lng: 7.4209, nom: "Palais Princier 👑", 
                texte: "Direction le Palais princier de Monaco 👑\n\nFais une photo face à la résidence du Prince pour compléter cette étape du jeu de piste."
            },
            { 
                id: 2, lat: 43.7306, lng: 7.4255, nom: "Musée Océanographique 🌊", 
                texte: "Rends-toi devant le Musée océanographique de Monaco et immortalise ta visite !\n\nPrends une photo avec la mer en arrière-plan pour valider ton passage."
            },
            { 
                id: 3, lat: 43.7302, lng: 7.4225, nom: "Cathédrale de Monaco ⛪", 
                texte: "Cap sur la Cathédrale de Monaco !\n\nPlace-toi devant ce lieu emblématique et prends une photo souvenir pour poursuivre l’aventure."
            }
        ];

        window.onload = function() {
            map = L.map('map', { zoomControl: false }).setView([43.7311, 7.4209], 18);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

            playerPos = L.latLng(43.7315, 7.4200);
            playerMarker = L.circleMarker(playerPos, {
                radius: 12, fillColor: "#007bff", color: "#fff", weight: 4, fillOpacity: 1
            }).addTo(map);

            defis.forEach(d => {
                L.circle([d.lat, d.lng], { color: 'red', fillOpacity: 0.1, weight: 1, radius: 35 }).addTo(map);
                d.marker = L.marker([d.lat, d.lng]).addTo(map);
                d.completed = false;
            });
        };

        window.move = function(direction) {
            const step = 0.00010;
            let lat = playerPos.lat;
            let lng = playerPos.lng;
            if(direction === 'up') lat += step;
            if(direction === 'down') lat -= step;
            if(direction === 'left') lng -= step;
            if(direction === 'right') lng += step;

            playerPos = L.latLng(lat, lng);
            playerMarker.setLatLng(playerPos);
            map.panTo(playerPos);
            checkProximite();
        };

        function checkProximite() {
            defis.forEach(d => {
                let dist = playerPos.distanceTo([d.lat, d.lng]);
                if(dist < 35 && !d.completed && activeDefi === null) {
                    openModal(d);
                }
            });
        }

        function openModal(defi) {
            activeDefi = defi;
            document.getElementById('modal-title').innerText = defi.nom;
            document.getElementById('modal-text').innerText = defi.texte;
            document.getElementById('photo-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('photo-modal').style.display = 'none';
            activeDefi = null; 
        }

        document.getElementById('camera-input').onchange = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('photo-modal').style.display = 'none';
            document.getElementById('loader-overlay').style.display = 'flex';

            const reader = new FileReader();
            reader.onload = function(e) {
                const bytes = e.target.result.split(',')[1];
                
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: bytes
                })
                .then(() => {
                    activeDefi.completed = true;
                    activeDefi.marker.setIcon(new L.Icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
                        iconSize: [25, 41], iconAnchor: [12, 41]
                    }));
                    
                    document.getElementById('loader-overlay').style.display = 'none';
                    alert("Bravo ! Photo enregistrée.");
                    activeDefi = null;
                })
                .catch(err => {
                    alert("Erreur. Vérifie ta connexion.");
                    document.getElementById('loader-overlay').style.display = 'none';
                    document.getElementById('photo-modal').style.display = 'flex';
                });
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
